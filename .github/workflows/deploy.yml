name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate sitemap
        run: node -e "
          const p=require('./data/products.js').default||require('./data/products.js');
          const d=new Date().toISOString().split('T')[0];
          const S='https://devclc.github.io/promokod-site';
          const u=['','/catalog',...p.map(x=>'/product/'+x.id)];
          const xml='<?xml version=\"1.0\" encoding=\"UTF-8\"?>\n<urlset xmlns=\"http://www.sitemaps.org/schemas/sitemap/0.9\">\n'+u.map(x=>'<url><loc>'+S+x+'</loc><lastmod>'+d+'</lastmod><priority>'+(x===''?'1.0':'0.9')+'</priority></url>').join('\n')+'\n</urlset>';
          require('fs').writeFileSync('./public/sitemap.xml',xml);
          console.log('Sitemap: '+u.length+' URLs');
        "

      - name: Build
        run: npm run build
        env:
          NODE_ENV: production

      - name: Add .nojekyll
        run: touch ./out/.nojekyll

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
